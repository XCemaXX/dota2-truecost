# Axiom Rules - Single Source of Truth for Item Valuation

version: "1.0"
patch: "7.41b"

# Settings — named constants for pipeline and formulas
# Each setting can be a plain value or a dict with {value, name, comment}
settings:
  # Pipeline
  max_resolution_iterations:
    value: 10
    name: "Max Iterations"
    comment: "Maximum axiom resolution iterations"

  # Gameplay coefficients
  cooldown_efficiency:
    value: 0.75
    name: "CD Efficiency"
    comment: "Multiplier for CD-based abilities (0.75 = realistic usage)"
  aura_avg_targets:
    value: 1.5
    name: "Avg Aura Targets"
    comment: "Average heroes affected by aura"
  armor_damage_factor:
    value: 0.06
    name: "Armor Factor"
    comment: "Dota 2 armor constant: each armor reduces phys dmg by ~6%"

  # Expected hero values (for formulas and amplification calculations)
  expected_hp_regen:
    value: 10
    name: "Expected HP Regen"
    comment: "STR hero base at Sange timing (~8-12 HP/sec total)"
  expected_mana_regen:
    value: 4
    name: "Expected Mana Regen"
    comment: "INT hero at Kaya purchase (~4-5 mana/sec total)"
  expected_attack_damage:
    value: 200
    name: "Expected Attack Damage"
    comment: "Carry hero total damage at crit item timing (~level 15-20)"
  expected_mana_pool:
    value: 780
    name: "Expected Mana Pool"
    comment: "INT hero base mana at Null Talisman timing (~level 7)"
  expected_move_speed:
    value: 365
    name: "Expected Move Speed"
    comment: "Base hero MS (~315) + boots (~50)"
  expected_physical_damage:
    value: 150
    name: "Expected Phys Damage"
    comment: "Average physical attack damage in midgame"
  expected_missing_hp:
    value: 900
    name: "Expected Missing HP"
    comment: "STR hero at Heart timing: ~3000 HP, ~30% missing avg"
  expected_enemy_hp:
    value: 3000
    name: "Expected Enemy HP"
    comment: "Average enemy hero HP for %HP drain calculations"
  permanent_dmg_uptime_during_whole_game:
    value: 0.20
    name: "Persistent DMG Uptime"
    comment: "% of game time persistent damage hits enemies"

  base_disable_gold:
    value: 2000
    name: "Base Disable Gold"
    comment: |
      Gold per normalized second of disable.
      Items compute cc_stat = duration / sqrt(cooldown), axiom prices it.
      Formula: cc_value = (duration / sqrt(CD)) × base_disable_gold × type_coeff

# =============================================================================
# AXIOMS - Main stat pricing definitions
# =============================================================================
#
# Methods available:
#   - reference_item: Calculate from item price / stat value
#   - manual: Direct gold_per_point value with explanation
#   - formula: Math expression referencing other axioms (or just "other_axiom" as reference)
#   - amplification_of: Percentage amplification of another axiom
#
# Modifiers (for reference_item):
#   - subtract_stats: Subtract other stats' cost first
#   - uptime: Apply duration/(duration+cooldown) multiplier
# =============================================================================

axioms:
  # -------------------------------------------------------------------------
  # Base Axioms - Pure stat items (reference_item method)
  # -------------------------------------------------------------------------

  bonus_strength:
    method: reference_item
    reference_item: item_ogre_axe
    stat: bonus_strength
    display_name: "Strength"
    category: attributes
    comment: |
      Mid-tier pure STR item. Consistent with AGI/INT pricing

  bonus_agility:
    method: reference_item
    reference_item: item_blade_of_alacrity
    stat: bonus_agility
    display_name: "Agility"
    category: attributes
    comment: |
      Mid-tier pure AGI item. Consistent with STR/INT pricing

  bonus_intellect:
    method: reference_item
    reference_item: item_staff_of_wizardry
    stat: bonus_intellect
    display_name: "Intelligence"
    category: attributes
    comment: |
      Mid-tier pure INT item. Consistent with STR/AGI pricing

  bonus_all_stats:
    method: formula
    formula: "(bonus_strength + bonus_agility + bonus_intellect) / 3"
    display_name: "All Stats"
    category: attributes
    comment: |
      +1 all stats = +1 STR + +1 AGI + +1 INT. Average of three

  bonus_health:
    method: reference_item
    reference_item: item_vitality_booster
    stat: bonus_health
    display_name: "Health"
    category: defense
    comment: |
      Mid-tier pure HP item. Builds into major HP items

  bonus_mana:
    method: reference_item
    reference_item: item_energy_booster
    stat: bonus_mana
    display_name: "Mana"
    category: utility
    comment: |
      Cheapest pure mana pool item. Builds into Arcane Boots and major mana items

  bonus_health_regen:
    method: reference_item
    reference_item: item_ring_of_regen
    stat: bonus_health_regen
    display_name: "HP Regen"
    category: sustain
    comment: |
      Cheapest pure HP regen item. Basic component

  bonus_mana_regen:
    method: reference_item
    reference_item: item_sobi_mask
    stat: bonus_mana_regen
    display_name: "MP Regen"
    category: sustain
    comment: |
      Cheapest pure mana regen item. Basic component

  bonus_damage:
    method: reference_item
    reference_item: item_blades_of_attack
    stat: bonus_damage
    display_name: "Damage"
    category: offense
    comment: |
      Cheapest pure damage item. Basic component for damage builds

  bonus_attack_speed:
    method: reference_item
    reference_item: item_gloves
    stat: bonus_attack_speed
    display_name: "Attack Speed"
    category: offense
    comment: |
      Cheapest pure attack speed item. Basic component

  bonus_armor:
    method: reference_item
    reference_item: item_chainmail
    stat: bonus_armor
    display_name: "Armor"
    category: defense
    comment: |
      Mid-tier pure armor item. Ring of Protection too cheap to be representative

  bonus_magic_resistance:
    method: reference_item
    reference_item: item_cloak
    stat: bonus_magical_armor
    display_name: "Magic Resistance"
    category: defense
    comment: |
      Only pure magic resistance item. Basic component for Hood/Pipe builds

  bonus_movement_speed:
    method: reference_item
    reference_item: item_boots
    stat: bonus_movement_speed
    display_name: "Movement Speed"
    category: movement
    comment: |
      Basic movement item. Foundation for all boot upgrades

  bonus_movement_speed_pct:
    method: formula
    formula: "bonus_movement_speed * expected_move_speed / 100"
    display_name: "Movement Speed %"
    category: movement
    comment: "1% MS converted via flat MS axiom and expected move speed."

  displacement:
    method: reference_item
    reference_item: item_blink
    stat: blink_range
    display_name: "Displacement"
    category: movement
    comment: "Blink Dagger as reference for displacement per unit"

  bonus_evasion:
    method: reference_item
    reference_item: item_talisman_of_evasion
    stat: bonus_evasion
    display_name: "Evasion"
    category: defense
    comment: |
      Only pure evasion item. Component for Butterfly, counters physical attacks

  bonus_lifesteal:
    method: reference_item
    reference_item: item_lifesteal
    stat: lifesteal_percent
    display_name: "Lifesteal"
    category: sustain
    comment: |
      Only pure lifesteal item. Component for Satanic, Mask of Madness

  aoe_bonus:
    method: reference_item
    reference_item: item_chasm_stone
    stat: aoe_bonus
    display_name: "Area of Effect"
    category: utility
    comment: |
      Chasm Stone reference for AoE radius bonus. Does not stack across
      Chasm-derived items in-game, but priced per-item here.

  # -------------------------------------------------------------------------
  # Secondary Axioms - Complex/multi-component items
  # -------------------------------------------------------------------------

  cast_range_bonus:
    method: reference_item
    reference_item: item_aether_lens
    stat: cast_range_bonus
    subtract_stats: [bonus_mana, bonus_mana_regen]
    display_name: "Cast Range"
    category: utility
    comment: |
      Aether Lens minus mana and mana regen stats. Remainder divided by cast range

  bonus_movement_speed_percent:
    method: reference_item
    reference_item: item_boots
    stat: bonus_movement_speed
    display_name: "Movement Speed %"
    category: movement
    comment: |
      Boots of Speed is the foundational movement item. Converted from flat MS to percent using base MS

  phase_movement_speed:
    method: formula
    formula: "bonus_movement_speed"
    display_name: "Phase Movement Speed"
    category: movement
    comment: |
      Temporary MS bonus = bonus_movement_speed. Uptime applied at item level via uptime_stats

  phase_movement_speed_range:
    method: formula
    formula: "bonus_movement_speed"
    display_name: "Phase Movement Speed (Ranged)"
    category: movement
    comment: |
      Same as phase_movement_speed but for ranged heroes. Uptime applied at item level

  spell_lifesteal:
    method: reference_item
    reference_item: item_voodoo_mask
    stat: spell_lifesteal
    display_name: "Spell Lifesteal"
    category: sustain
    comment: |
      Spell lifesteal is more expensive than regular lifesteal

  mana_gain:
    method: formula
    formula: "(bonus_mana_regen - bonus_health_regen) / 2"
    display_name: "Mana Gain (sacrifice)"
    category: sustain
    comment: "Mana regen value minus HP drain cost, halved for temp mana."

  corruption_armor:
    method: reference_item
    reference_item: item_blight_stone
    stat: corruption_armor
    display_name: "Armor Reduction"
    category: offense
    comment: |
      Negative stat: gold_per_point will be negative

  feedback_mana_burn:
    method: formula
    formula: "bonus_damage"
    display_name: "Mana Burn"
    category: offense
    comment: |
      Mana burn = physical damage per hit + mana drain. Priced as bonus_damage

  damage_reflection_pct:
    method: formula
    formula: "bonus_damage * expected_physical_damage / 100 / 2"
    display_name: "Damage Reflection %"
    category: defense
    comment: |
      1% reflected damage = expected_physical_damage/100 flat damage per hit received.
      Halved (x0.5) because reflection only works when being attacked, not always.

  absorb_amount:
    method: formula
    formula: "bonus_health / 2"
    display_name: "Absorb Amount"
    category: defense
    comment: "Physical-only barrier = HP value halved."

  # CC disable pricing: gold per "normalized second" = duration / sqrt(cooldown).
  # Type coefficients reflect disable strength (hex best, cyclone worst).
  cc_hex:
    method: formula
    formula: "base_disable_gold * 1.0"
    display_name: "Hex (per sqrt-sec)"
    category: disable
    comment: "Silence+mute+disarm+slow. Best item delivery (800 range instant)"

  cc_stun:
    method: formula
    formula: "base_disable_gold * 1.0"
    display_name: "Stun (per sqrt-sec)"
    category: disable
    comment: "Full lockdown but item stuns have poor delivery"

  cc_silence:
    method: formula
    formula: "base_disable_gold * 0.6"
    display_name: "Silence (per sqrt-sec)"
    category: disable
    comment: "Spell-only block, doesn't cancel TP"

  cc_root:
    method: formula
    formula: "base_disable_gold * 0.5"
    display_name: "Root (per sqrt-sec)"
    category: disable
    comment: "No movement + cancels TP, but can still cast/attack"

  cc_disarm:
    method: formula
    formula: "base_disable_gold * 0.2"
    display_name: "Disarm (per sqrt-sec)"
    category: disable
    comment: "Prevents attacks only — weakest disable type"

  cc_immunity:
    method: formula
    formula: "base_disable_gold * 1.0"
    display_name: "Spell Immunity (per sqrt-sec)"
    category: disable
    comment: "Blocks all targeted spells and CC — strongest defensive ability"

  cc_reflect:
    method: formula
    formula: "base_disable_gold * 0.2"
    display_name: "Spell Reflect (per sqrt-sec)"
    category: disable
    comment: "Reflects targeted spells back + dispel on cast — weaker than immunity"

  cc_cyclone:
    method: formula
    formula: "base_disable_gold * 0.4"
    display_name: "Cyclone (per sqrt-sec)"
    category: disable
    comment: "Full disable but target invulnerable — can't capitalize"

  aura_mana_regen:
    method: formula
    formula: "bonus_mana_regen * aura_avg_targets"
    display_name: "Mana Regen Aura"
    category: aura
    comment: |
      Personal mana regen scaled by avg aura targets

  aura_health_regen:
    method: formula
    formula: "bonus_health_regen * aura_avg_targets"
    display_name: "Health Regen Aura"
    category: aura
    comment: |
      Personal HP regen scaled by avg aura targets

  bonus_aoe_armor:
    method: formula
    formula: "bonus_armor * aura_avg_targets"
    display_name: "Armor Aura"
    category: aura
    comment: |
      Personal armor scaled by avg aura targets

  bonus_cooldown:
    method: reference_item
    reference_item: item_octarine_core
    stat: bonus_cooldown
    display_name: "Cooldown Reduction"
    category: utility
    subtract_stats:
      - bonus_health
      - bonus_mana
      - bonus_mana_regen
    comment: |
      Octarine Core minus stats. Remainder divided by cooldown reduction

  # crit_chance and crit_multiplier REMOVED - compound mechanic
  # Crit is valued via ability_value per item (expected DPS increase)
  # See item_overrides for item_lesser_crit, item_greater_crit

  bonus_chance_damage:
    method: formula
    formula: "bonus_damage"
    chance_stat: bonus_chance
    display_name: "Pierce Damage"
    category: offense
    comment: "Per-attack proc damage priced as attack damage. Chance applied separately."


  # -------------------------------------------------------------------------
  # Amplification Axioms
  # -------------------------------------------------------------------------

  hp_regen_amp:
    method: amplification_of
    base_axiom: bonus_health_regen
    expected_base_key: expected_hp_regen
    display_name: "HP Regen Amplification"
    category: amplification
    comment: "Amplifies HP regen"

  mana_regen_multiplier:
    method: amplification_of
    base_axiom: bonus_mana_regen
    expected_base_key: expected_mana_regen
    display_name: "Mana Regen Multiplier"
    category: amplification
    comment: "Amplifies mana regen"

  crit_expected_dps:
    method: amplification_of
    base_axiom: bonus_damage
    expected_base_key: expected_attack_damage
    display_name: "Crit Expected DPS"
    category: amplification
    comment: |
      Expected DPS increase from crit.
      Used with custom_stats formula: crit_chance/100 * (crit_multiplier - 100).

  missing_health_regen:
    method: amplification_of
    base_axiom: bonus_health_regen
    expected_base_key: expected_missing_hp
    display_name: "Missing HP Regen"
    category: amplification
    comment: |
      1% missing HP regen

  # -------------------------------------------------------------------------
  # Manual Axioms - Direct values with explanations
  # -------------------------------------------------------------------------

  bonus_gold:
    method: formula
    formula: "1500 / 90"
    display_name: "Bonus Gold"
    category: utility
    comment: "Average game time / charge restore time = uses per game"

  replenish_amount:
    method: formula
    formula: "aura_mana_regen"
    display_name: "Mana Replenish"
    category: aura
    comment: |
      Priced as aura_mana_regen (team mana restore). Use with uptime_stats + cooldown

  block_damage_melee:
    method: formula
    formula: "bonus_armor / expected_physical_damage / armor_damage_factor"
    display_name: "Block Damage (Melee)"
    category: defense
    comment: "1 block = armor equivalent via expected phys damage and armor factor. Chance applied separately."

  block_damage_ranged:
    method: formula
    formula: "bonus_armor / expected_physical_damage / armor_damage_factor"
    display_name: "Block Damage (Ranged)"
    category: defense
    comment: "Same as melee — pipeline applies melee/ranged switchable separately."

  aura_attack_speed:
    method: formula
    formula: "bonus_attack_speed * aura_avg_targets"
    display_name: "Attack Speed Aura"
    category: aura
    comment: |
      Attack speed aura affects multiple heroes, like other auras

  aura_negative_attack_speed:
    method: formula
    formula: "aura_attack_speed * -1"
    display_name: "Negative Attack Speed Aura"
    category: aura
    comment: |
      Mirror of positive AS aura. Negative g/pt because stat value is negative.
      Debuff on enemies = benefit

  aura_positive_armor:
    method: formula
    formula: "bonus_aoe_armor"
    display_name: "Positive Armor Aura"
    category: aura
    comment: |
      Same effect as Armor Aura. Different stat name in Assault Cuirass.

  aura_negative_armor:
    method: formula
    formula: "aura_positive_armor * -1"
    display_name: "Negative Armor Aura"
    category: aura
    comment: |
      Mirror of positive armor aura. Negative g/pt because stat value is negative

  penalty_armor:
    method: formula
    formula: "bonus_armor * -1"
    display_name: "Armor Penalty"
    category: defense
    comment: |
      For stats stored as positive values but representing armor loss (MoM berserk_armor_reduction).

  penalty_health_regen:
    method: formula
    formula: "bonus_health_regen * -1"
    display_name: "HP Regen Penalty"
    category: sustain
    comment: |
      For stats stored as positive values but representing HP drain (Armlet unholy_health_drain).

  lifesteal_aura:
    method: formula
    formula: "bonus_lifesteal * aura_avg_targets"
    display_name: "Lifesteal Aura"
    category: aura
    comment: |
      Lifesteal scaled by avg aura targets

  damage_aura:
    method: formula
    formula: "bonus_damage * expected_attack_damage / 100 * aura_avg_targets"
    display_name: "Damage Aura"
    category: aura
    comment: |
      Percentage-based aura: 1% damage = expected_attack_damage/100 flat damage per target

  slow_resistance:
    method: reference_item
    reference_item: item_sange
    stat: slow_resistance
    subtract_stats:
      - bonus_strength
      - hp_regen_amp
    display_name: "Slow Resistance"
    category: defense
    comment: |
      Sange minus STR and hp_regen_amp. Remainder divided by slow resist

  spell_amp:
    method: reference_item
    reference_item: item_kaya
    stat: spell_amp
    subtract_stats:
      - bonus_intellect
      - mana_regen_multiplier
    display_name: "Spell Amplification"
    category: utility
    comment: |
      Kaya minus INT and mana regen multiplier. Remainder divided by spell amp

  # bash_chance_melee, bash_chance_ranged, bash_duration REMOVED
  # Bash chance is a modifier, not independently valued
  # Bash damage uses bonus_chance_damage with manual_uptime override
  # Bash duration valued via uptime_stats manual_uptime on items

  # chain_chance REMOVED - now used as modifier via chance_stat on chain_damage

  chain_damage:
    method: reference_item
    reference_item: item_maelstrom
    stat: chain_damage
    chance_stat: chain_chance
    subtract_stats:
      - bonus_damage
      - bonus_attack_speed
    display_name: "Chain Lightning Damage"
    category: offense
    comment: |
      Maelstrom minus damage/AS, divided by 110 dmg and 25% chance

  bonus_movement_speed_melee:
    method: formula
    formula: "bonus_movement_speed * 1.0"
    display_name: "Movement Speed (Melee)"
    category: movement
    comment: |
      Same value as generic move speed. Used for melee/ranged split items.

  bonus_movement_speed_ranged:
    method: formula
    formula: "bonus_movement_speed * 1.0"
    display_name: "Movement Speed (Ranged)"
    category: movement
    comment: |
      Same value as generic move speed. Used for melee/ranged split items.

  bonus_damage_melee:
    method: formula
    formula: "bonus_damage * 1.0"
    display_name: "Damage (Melee)"
    category: offense
    comment: |
      Same value as generic damage. Used for melee/ranged split items.

  bonus_damage_range:
    method: formula
    formula: "bonus_damage * 1.0"
    display_name: "Damage (Ranged)"
    category: offense
    comment: |
      Same value as generic damage. Used for melee/ranged split items.

  bonus_spell_damage:
    method: formula
    formula: "bonus_health"
    display_name: "Spell Damage"
    category: offense
    comment: |
      Flat magic damage proc. 1 damage = 1 HP removed.
      Used with uptime_stats for cooldown-based procs.

  restore_per_charge:
    method: formula
    formula: "bonus_health_regen + bonus_mana_regen"
    display_name: "Restore per Charge"
    category: sustain
    comment: |
      Restores HP and mana equally per charge. Value = HP regen + mana regen axioms.

  heal_reduction:
    method: formula
    formula: "hp_regen_amp"
    display_name: "Heal Reduction"
    category: debuff
    comment: |
      Lower bound: 1% heal reduction >= 1% HP regen amp.
      Actual value higher since heal reduction also affects lifesteal, salves, etc.

  bonus_night_vision:
    method: reference_item
    reference_item: item_moon_shard
    stat: bonus_night_vision
    subtract_stats:
      - bonus_attack_speed
    display_name: "Night Vision"
    category: special
    comment: |
      Moon Shard minus attack speed. Remainder divided by night vision

  bonus_stat:
    method: formula
    formula: "bonus_strength"
    display_name: "Switchable Attribute"
    category: special
    comment: |
      Switchable attribute (STR/AGI/INT), not all_stats! (Power Treads)

  int_damage:
    method: formula
    formula: "bonus_damage"
    display_name: "Intelligence Damage"
    category: offense
    comment: |
      Intelligence-based damage. Valued same as regular attack damage

  bonus_attack_speed_pct:
    method: formula
    formula: "bonus_attack_speed"
    display_name: "Attack Speed Percent"
    category: offense
    comment: |
      Percentage AS, counted same as regular

  movespeed_slow:
    method: formula
    formula: "-1 * bonus_movement_speed_percent"
    display_name: "Movement Slow"
    category: disable
    comment: |
      Slowing enemy = speeding self. Valve stores as negative, invert sign.

  cold_attack_slow_melee:
    method: formula
    formula: "-1 * bonus_attack_speed"
    display_name: "Cold AS Slow (Melee)"
    category: disable
    comment: |
      Skadi melee AS slow. Negative in data, inverted formula.

  cold_attack_slow_ranged:
    method: formula
    formula: "-1 * bonus_attack_speed"
    display_name: "Cold AS Slow (Ranged)"
    category: disable
    comment: |
      Skadi ranged AS slow. Negative in data, inverted formula.

  bonus_damage_base:
    method: formula
    formula: "bonus_damage"
    display_name: "Base Damage"
    category: offense
    comment: |
      Rapier base damage. ALWAYS active, regardless of mode.

  bonus_max_mana_percentage:
    method: amplification_of
    base_axiom: bonus_mana
    expected_base_key: expected_mana_pool
    display_name: "Max Mana %"
    category: amplification
    comment: |
      Percentage increase to max mana pool

  manacost_reduction:
    method: formula
    formula: "bonus_max_mana_percentage"
    display_name: "Mana Cost Reduction"
    category: utility
    comment: |
      1% mana cost reduction ≈ 1% more effective mana pool


  # -------------------------------------------------------------------------
  # Formula-based Axioms
  # -------------------------------------------------------------------------

  heal_amplification:
    method: formula
    formula: "hp_regen_amp * 2"
    display_name: "Heal Amplification"
    category: derived
    comment: |
      ASSUMPTION: heal amp = 2x HP regen amp

  lifesteal_amplification:
    method: formula
    formula: "hp_regen_amp * 1.75"
    display_name: "Lifesteal Amplification"
    category: derived
    comment: |
      ASSUMPTION: from Sange ratio

  magic_resistance_aura:
    method: formula
    formula: "bonus_magic_resistance * aura_avg_targets"
    display_name: "Magic Resistance Aura"
    category: derived
    comment: |
      Personal magic resist scaled by avg aura targets

  aura_movement_speed:
    method: formula
    formula: "bonus_movement_speed * aura_avg_targets"
    display_name: "Movement Speed Aura"
    category: derived
    comment: |
      Personal MS scaled by avg aura targets (Drum of Endurance)

  aura_movement_speed_pct:
    method: formula
    formula: "bonus_movement_speed_pct * aura_avg_targets"
    display_name: "Movement Speed % Aura"
    category: derived
    comment: "Personal % MS scaled by avg aura targets. For team active buffs (Drums, BoB)."

  # -------------------------------------------------------------------------
  # Anti-Heal / Restoration Reduction
  # -------------------------------------------------------------------------

  restoration_reduction_aura:
    method: formula
    formula: "bonus_health_regen * expected_hp_regen / 100 * aura_avg_targets"
    display_name: "Heal Reduction Aura %"
    category: aura
    comment: |
      1% heal reduction on enemies, scaled by expected HP regen and avg aura targets

  restoration_reduction_enemy:
    method: formula
    formula: "bonus_health_regen * expected_hp_regen / 100"
    display_name: "Heal Reduction (single target) %"
    category: debuff
    comment: |
      Single-target heal reduction. No aura multiplier. Spirit Vessel 70%: uptime applied separately.

  # -------------------------------------------------------------------------
  # Illusion DPS
  # -------------------------------------------------------------------------

  illusion_dps:
    method: formula
    formula: "bonus_damage"
    display_name: "Illusion DPS (dmg equiv)"
    category: offense
    comment: |
      Illusion damage as effective bonus damage.
      Custom_stat computes: %dmg × count × uptime / survivability × expected_dmg.

  # -------------------------------------------------------------------------
  # AoE Burst Damage (custom_stat aliases)
  # -------------------------------------------------------------------------

  blast_aoe_damage:
    method: formula
    formula: "bonus_health"
    display_name: "AoE Burst Damage"
    category: offense
    comment: "AoE magic burst. Same g/pt as HP. AoE multiplied in custom_stat."

  damage_per_second:
    method: formula
    formula: "bonus_damage * aura_avg_targets * permanent_dmg_uptime_during_whole_game"
    display_name: "Damage Per Second"
    category: offense
    comment: "Persistent AoE DPS scaled by avg targets and uptime."

  blast_slow_value:
    method: formula
    formula: "bonus_movement_speed"
    display_name: "AoE Slow (MS equiv)"
    category: disable
    comment: "AoE slow converted to MS equivalent. Uptime + targets in custom_stat."

  # -------------------------------------------------------------------------
  # Alias Axioms
  # -------------------------------------------------------------------------

  damage:
    method: formula
    formula: "bonus_health"
    display_name: "Magic/Ability Damage"
    category: offense
    comment: |
      Magic/ability burst damage. 1 damage = 1 HP removed, same gold value

# =============================================================================
# ITEM OVERRIDES - Per-item special rules
# =============================================================================
# For items with unique mechanics that don't fit standard axiom evaluation.
#
# Supported fields:
#   - ability_value: Gold value for the item's active ability
#   - custom_stats: Manual stat values for unique mechanics
#   - ignored_stats: Stats to ignore for this specific item
#   - switchable_stats: Stats with multipliers for toggle modes
#   - excluded: true to exclude item entirely
#   - comment: Explanation of the override

